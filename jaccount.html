<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .card-container h2 {
            margin-bottom: 8px;
            color: #333333;
            font-weight: 600;
        }

        .card-container p {
            color: #666666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .photo-setup-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 24px auto;
        }

        .profile-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #4a90e2;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.2);
        }

        .file-label {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #4a90e2;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 3px solid #ffffff;
            transition: all 0.3s ease;
        }

        .file-label:hover {
            background: #357abd;
            transform: scale(1.1);
        }

        #file-input {
            display: none;
        }

        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #555555;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }

        .primary-btn {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .primary-btn:hover {
            background-color: #357abd;
        }
        
    </style>
</head>
<body>

    <div class="card-container" id="form-view">
        <h2>Please Make Your Own Profile</h2>
        <p>Please enter your profile photo and name</p>

        <div class="photo-setup-container">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" id="form-avatar-preview" class="profile-preview" alt="Preview">
            <label for="file-input" class="file-label">
                <i class="fas fa-camera"></i>
            </label>
            <input type="file" id="file-input" accept="image/jpeg, image/jpg, image/png">
        </div>

        <div class="input-group">
            <label for="username-input">Name</label>
            <input type="text" id="username-input" placeholder="Enter Your Name" required>
        </div>

        <button type="button" class="primary-btn" onclick="saveProfile()">Save Profile</button>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const formAvatarPreview = document.getElementById('form-avatar-preview');
        let selectedImageDataUrl = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"; // Default Image

        // Google Login ကနေ ဝင်လာခဲ့တဲ့ အီးမေးလ် ရှိမရှိ အရင်စစ်မယ်
        window.onload = function() {
            if (!localStorage.getItem('user_email')) {
                // အကယ်၍ အီးမေးလ်မရှိရင် Login page ကို ပြန်မောင်းထုတ်မယ်
                window.location.href = "index.html";
            }
        };

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    formAvatarPreview.src = e.target.result;
                    selectedImageDataUrl = e.target.result; 
                }
                reader.readAsDataURL(file);
            }
        });

        function saveProfile() {
            const nameInput = document.getElementById('username-input').value.trim();
            const currentEmail = localStorage.getItem('user_email');

            if (nameInput === "") {
                alert("ကျေးဇူးပြု၍ နာမည် အရင်ရိုက်ထည့်ပေးပါခင်ဗျာ။");
                return;
            }

            // လက်ရှိသုံးစွဲသူအတွက် LocalStorage သိမ်းခြင်း
            localStorage.setItem('user_name', nameInput);
            localStorage.setItem('user_photo', selectedImageDataUrl);

            // 🟢 လူအများကြီးစာရင်း (Array) ထဲသို့ အချက်အလက် ထည့်သွင်းသိမ်းဆည်းခြင်းစနစ်
            let allMembers = JSON.parse(localStorage.getItem('all_members_list')) || [];
            
            // Gmail တူပြီးသား ရှိမရှိ စစ်ဆေးပြီး Update လုပ် သို့မဟုတ် အသစ်ထည့်မယ်
            const existingIndex = allMembers.findIndex(member => member.email === currentEmail);
            if (existingIndex !== -1) {
                allMembers[existingIndex].name = nameInput;
                allMembers[existingIndex].photo = selectedImageDataUrl;
            } else {
                allMembers.push({
                    name: nameInput,
                    email: currentEmail,
                    photo: selectedImageDataUrl
                });
            }
            localStorage.setItem('all_members_list', JSON.stringify(allMembers));

            // ပင်မ Home Page သို့ သွားခြင်း
            window.location.href = "jhomepage.html";
        }
    </script>

</body>
</html>
